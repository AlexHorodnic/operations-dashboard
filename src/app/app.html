<div class="dashboard-shell">
  <aside class="sidebar">
    <div class="sidebar__top">
      <a class="brand" routerLink="/overview" aria-label="Operations dashboard home">
        <span>OD</span>
        <strong>Operations</strong>
      </a>
      <span class="workspace-badge">Prod</span>
    </div>

    <nav aria-label="Primary navigation">
      <span class="nav-label">Workspace</span>
      @for (item of navItems; track item.route) {
        <a [routerLink]="item.route" routerLinkActive="is-active">{{ item.label }}</a>
      }
    </nav>

    <div class="sidebar__footer">
      <span>Workspace</span>
      <strong>Acme Operations</strong>
    </div>
  </aside>

  <main class="dashboard-main">
    <header class="topbar">
      <div class="topbar__title">
        <span class="breadcrumb">Operations / {{ breadcrumbs() }}</span>
        <h1>{{ breadcrumbs() }}</h1>
      </div>

      <div class="topbar__actions">
        <button class="search-control" type="button" (click)="commandOpen.set(true)" aria-label="Open command palette">
          <span>/</span>
          <strong>Search accounts, tasks, reports...</strong>
        </button>
        <button class="workspace-select" type="button">
          <span>Acme Operations</span>
          <strong>Team workspace</strong>
        </button>
        <button class="icon-button" type="button" [attr.aria-label]="'Switch to ' + (theme.mode() === 'dark' ? 'light' : 'dark') + ' theme'" (click)="theme.toggle()">
          {{ theme.mode() === 'dark' ? 'L' : 'D' }}
        </button>
        <button class="icon-button has-dot" type="button" aria-label="Notifications">!</button>
        <button class="avatar-button" type="button" aria-label="Profile">AL</button>
      </div>
    </header>

    <div class="content-stack">
      <router-outlet />
    </div>
  </main>

  <app-command-palette [open]="commandOpen()" (closed)="commandOpen.set(false)" />
</div>
